<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FPS16_B - Spotcheck</title>

  <!-- ================= STYLES ================= -->
  <link rel="stylesheet" href="/assets/fontawesome-7.1.0/css/all.min.css">
  <link rel="stylesheet" href="./index.css">
  <link rel="stylesheet" href="./general_style.css">

  <link rel="manifest" href="/assets/icon/manifest.json">
  <link rel="icon" href="/assets/icon/icon.ico">
</head>

<body>

  <!-- ================= HEADER ================= -->
  <header>
    <div class="titlebar-top">
      <span class="titlebar-version">SPOTCHECK</span>
    </div>

    <div class="titlebar-bottom">
      <span class="titlebar-page" id="homeBtn">
        <i class="fa-solid fa-house"></i>
        HOME
      </span>
    </div>
  </header>

  <!-- ================= MAIN ================= -->
  <main>
    <div class="main-content">

      <!-- popup message -->
      <div id="popupMessage" class="popup hidden">
        <span id="popupText"></span>
      </div>

      <!-- analysis -->
      <button class="main-button" id="btnAnalysis">
        <span class="icon">
          <i class="fa-solid fa-magnifying-glass-chart"></i>
        </span>
        <span class="text">ANALYSIS</span>
      </button>

      <!-- optical inspection -->
      <button class="main-button" id="btnFam">
        <span class="icon">
          <i class="fa-solid fa-vials"></i>
        </span>
        <span class="text">OPTICAL INSPECTION</span>
      </button>

      <!-- system check -->
      <button class="main-button" id="btnSystemCheck">
        <span class="icon">
          <i class="fa-solid fa-list-check"></i>
        </span>
        <span class="text">SYSTEM CHECK</span>
      </button>

      <!-- kit management -->
      <button class="main-button" id="btnSetting">
        <span class="icon">
          <i class="fa-solid fa-gear"></i>
        </span>
        <span class="text">MANAGE KITS</span>
      </button>

      <!-- sample file management -->
      <button class="main-button" id="btnSampleFile">
        <span class="icon">
          <i class="fa-solid fa-file"></i>
        </span>
        <span class="text">MANAGE SAMPLE FILES</span>
      </button>

      <!-- results -->
      <button class="main-button" id="btnResults">
        <span class="icon">
          <i class="fa-solid fa-square-poll-horizontal"></i>
        </span>
        <span class="text">RESULTS</span>
      </button>

      <!-- email -->
      <button class="main-button" id="btnEmail" style="display:none;">
        <span class="icon">
          <i class="fa-solid fa-envelope"></i>
        </span>
        <span class="text">EMAIL</span>
      </button>

      <!-- wifi -->
      <button class="main-button" id="btnWifi" style="display:none;">
        <span class="icon">
          <i class="fa-solid fa-wifi"></i>
        </span>
        <span class="text">WIFI</span>
      </button>

    </div>
  </main>

  <!-- ================= FOOTER ================= -->
  <footer>
    <div class="footer-content">
      <p>&copy; Phusabiochem - FPS16</p>

      <!--
      <div class="footer-links">
        <a href="#">Privacy Policy</a>
        <a href="#">Terms of Service</a>
        <a href="#">Contact</a>
      </div>
      -->
    </div>
  </footer>

  <!-- ================= ANALYSIS MODE DIALOG ================= -->
  <div id="overlay">
    <div class="dialog">

      <button class="close-button" id="btnCloseDialog">×</button>

      <h3>Analysis Mode</h3>

      <button
        class="mode mode1"
        type="button"
        id="btnHighSensitivity"
      >
        High Sensitivity
      </button>

      <button
        class="mode mode2"
        type="button"
        id="btnLowSensitivity"
      >
        Low Sensitivity
      </button>

    </div>
  </div>

  <!-- ================= SCRIPTS ================= -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="./Navigation/nav.js"></script>
  <script src="index.js"></script>

</body>
</html>
