<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FPS16_B - Spotcheck</title>

  <link rel="stylesheet" href="../assets/fontawesome-7.1.0/css/all.min.css">
  <!-- <link rel="stylesheet" href="../general_style.css"> -->
  <link rel="stylesheet" href="./admin.css">
</head>

<body>

  <!-- ================= HEADER ================= -->
  <header>
    <div class="titlebar-top">
      <span class="titlebar-version">SPOTCHECK</span>
    </div>

    <div class="titlebar-bottom">
      <span class="titlebar-page">
        <i class="fa-solid fa-user-tie"></i> ADMIN
      </span>
    </div>
  </header>

  <!-- ================= MAIN ================= -->
  <main>
    <div class="main-container">

      <!-- ===== CONTENT GRID ===== -->
      <div class="content-grid">

        <!-- ===== LEFT COLUMN ===== -->
        <div class="column">

          <section class="panel">
            <h3>Coefficients</h3>
            <table id="coeffTable" class="table-grid"></table>
          </section>

          <section class="panel">
            <h3>Base Value</h3>
            <table id="baseTable" class="table-grid"></table>
          </section>

        </div>

        <!-- ===== RIGHT COLUMN ===== -->
        <div class="column">

          <section class="panel">
            <h3>Threshold</h3>

            <div class="form-row">
              <label>a_value</label>
              <input
                type="number"
                step="any"
                id="a_value"
                class="small-input"
              >
            </div>

            <div class="form-row">
              <label>b_value</label>
              <input
                type="number"
                step="any"
                id="b_value"
                class="small-input"
              >
            </div>
          </section>

          <section class="panel">
            <h3>Coordinates</h3>

            <div class="coord-section">
              <span>Editable</span>

              <div class="coord-grid labeled">
                <div class="coord-item">
                  <label>x1</label>
                  <input type="number" step="any" id="x1">
                </div>

                <div class="coord-item">
                  <label>y1</label>
                  <input type="number" step="any" id="y1">
                </div>

                <div class="coord-item">
                  <label>x2</label>
                  <input type="number" step="any" id="x2">
                </div>

                <div class="coord-item">
                  <label>y2</label>
                  <input type="number" step="any" id="y2">
                </div>
              </div>
            </div>

            <div class="coord-section">
              <span>Suggested</span>

              <div class="coord-grid labeled">
                <div class="coord-item">
                  <label>x1</label>
                  <input type="number" id="x1_0" disabled>
                </div>

                <div class="coord-item">
                  <label>y1</label>
                  <input type="number" id="y1_0" disabled>
                </div>

                <div class="coord-item">
                  <label>x2</label>
                  <input type="number" id="x2_0" disabled>
                </div>

                <div class="coord-item">
                  <label>y2</label>
                  <input type="number" id="y2_0" disabled>
                </div>
              </div>
            </div>
          </section>

          <section class="panel">
            <h3>FAM</h3>

            <div class="form-row">
              <label>threshold_1</label>
              <input
                type="number"
                step="any"
                id="threshold_1"
                class="small-input"
              >
            </div>

            <div class="form-row">
              <label>threshold_2</label>
              <input
                type="number"
                step="any"
                id="threshold_2"
                class="small-input"
              >
            </div>

            <div class="form-row">
              <label>threshold_3</label>
              <input
                type="number"
                step="any"
                id="threshold_3"
                class="small-input"
              >
            </div>

            <div class="form-row">
              <label>minus_value</label>
              <input
                type="number"
                step="any"
                id="minus_value"
                class="small-input"
              >
            </div>
          </section>

        </div>
      </div>

      <!-- ===== APPLY AREA ===== -->
      <div class="apply-area">
        <button id="btnApply">Apply</button>
      </div>

    </div>
  </main>

  <!-- ================= FOOTER ================= -->
  <footer>
    <button
      id="backBtn"
      type="button"
      onclick="Back_Clicked()"
    >
      Back
    </button>
  </footer>

  <!-- ================= SCRIPT ================= -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="admin.js"></script>
  <script src="../Navigation/nav.js"></script>

</body>
</html>
