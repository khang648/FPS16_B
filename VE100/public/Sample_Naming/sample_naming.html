<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FPS32B - VE100 26001</title>

  <!-- ================= STYLES ================= -->
  <link rel="stylesheet" href="../assets/fontawesome-7.1.0/css/all.min.css">
  <link rel="stylesheet" href="./sample_naming.css">
  <link rel="stylesheet" href="../general_style.css">
</head>

<body>

  <!-- ================= HEADER ================= -->
  <header>
    <div class="titlebar-top">
      <span class="titlebar-version">VE100</span>
    </div>

    <div class="titlebar-bottom">
      <span class="titlebar-page">
        <i class="fa-solid fa-magnifying-glass-chart"></i>
        WELL NAMING
      </span>
    </div>
  </header>

  <!-- ================= MAIN ================= -->
  <main>
    <div class="well-container">
        <!-- TOP CONTROL -->
        <div class="well-control">
        <label for="wellSelect">Number of wells</label>
        <select id="wellSelect">
            <option value="9">9 wells</option>
            <option value="17">17 wells</option>
        </select>
        </div>

        <!-- TABLE -->
        <div class="well-table-wrapper">
        <table class="well-table">
            <thead>
            <tr>
                <th class="col-no">No.</th>
                <th>Sample Names</th>
            </tr>
            </thead>
            <tbody id="wellTableBody">
            <!-- JS sẽ generate rows -->
            </tbody>
        </table>
        </div>

    </div>
  </main>


  <!-- ================= FOOTER ================= -->
  <footer>
    <button id="btnBack" type="button">Back</button>
    <button id="btnNext" type="button">Next</button>
  </footer>

  <!-- ================= SCRIPTS ================= -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="../Navigation/nav.js"></script>
  <script src="sample_naming.js"></script>

</body>
</html>
