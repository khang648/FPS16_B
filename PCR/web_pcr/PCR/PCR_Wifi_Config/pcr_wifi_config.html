  <main class="pcr-main">
    <div class="pcr-container">
      <div class="wifi-main">
        <!-- LEFT: WiFi form -->
        <div class="wifi-left">
          <div class="wifi-status">
            <span id="wifi-status-label">Checking...</span>
          </div>

          <div class="wifi-container">

            <div class="wifi-group">
              <label for="ssid">SSID</label>
              <input type="text" id="wifi-ssid" placeholder="Enter SSID">
            </div>

            <div class="wifi-group">
              <label for="password">Password</label>
              <div class="wifi-pass-wrapper">
                <input type="password" 
                      id="wifi-password" 
                      placeholder="Enter Password"
                      autocomplete="new-password"
                      autocorrect="off"
                      autocapitalize="off"
                      spellcheck="false">
                <label class="showpass-row">
                  <input type="checkbox" id="showPass">
                  <span>Show password</span>
                </label>
              </div>
            </div>

            <div class="wifi-buttons">
              <button id="btnConnect" type="button">Connect</button>
            </div>
          </div>
        </div>

        <!-- RIGHT: WiFi scan list -->
        <div class="wifi-right">
          <div>
            <span id="wifi-list-label">Available WiFi Networks</span>
          </div>
          <div>
            <ul id="wifi-list">
            </ul>
          </div>
        </div>
      </div>
      <div id="control-panel-wifi-config"    class="tool-container"></div>
    </div>
  </main>
