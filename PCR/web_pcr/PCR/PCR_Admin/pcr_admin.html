<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google" content="notranslate">
  <title>FPS16B_PCR</title>
  <link rel="apple-touch-icon"      sizes="32x32" href="../../assets/ICON.png">
  <link rel="icon" type="image/png" sizes="32x32" href="../../assets/ICON.png">
  <link rel="stylesheet" href="../PCR_Elements/style.css">
  <link rel="stylesheet" href="pcr_admin.css">
  <link rel="stylesheet" href="../PCR_Elements/Create_UI.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <main class="pcr-main">
    <div class="pcr-container">
          <div class="admin-list-container">
            <div class="carousel" id="carousel">

                <button class="card set time"     data-option="set_time">
                  <img src="../../assets/PCR_SET_TIME.png" alt="Set Time" class="card-icon">
                  <span>SET TIME</span>
                </button>

                <button class="card wifi calib"  data-option="wifi_config">
                  <img src="../../assets/PCR_WIFI_CONFIG.png" alt="wifi Config" class="card-icon">
                  <span>WIFI CONFIG</span>
                </button>

                <button class="card temp calib"   data-option="temp_calib">
                  <img src="../../assets/PCR_TEMP_CALIB.png" alt="Temp Calib" class="card-icon">
                  <span>TEMP CALIB</span>
                </button>

                <button class="card reset device" data-option="reset_device">
                  <img src="../../assets/PCR_RESET_DEVICE.png" alt="Reset Device" class="card-icon">
                  <span>RESET DEVICE</span>
                </button>

            </div>
            <div class="carousel-dots" id="carousel-dots"></div>
          </div>
          
          <div id="control-panel-admin"     class="tool-container"></div>
    </div>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="/components/header.js"></script> 
  
  <script src="../../Websocket/Websocket_ID.js"></script>
  <script type="module" src="../../Websocket/Websocket.js"></script>

  <script src="../PCR_Elements/Package.js"></script>
  <script src="../PCR_Elements/Convert.js"></script>
  <script src="../PCR_Elements/Handle.js"></script>
  <script src="../PCR_Elements/Data_config.js"></script>
  <script src="../PCR_Elements/Create_UI.js"></script>
  <script src="../PCR_Admin/pcr_admin.js"></script>
  
</body>
</html>
